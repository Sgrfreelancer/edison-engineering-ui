@if(isOpen){
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">

  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl overflow-hidden max-h-[90vh] overflow-y-auto">

    <div class="grid lg:grid-cols-2">

      <div class="bg-gradient-to-br from-blue-700 to-indigo-900 text-white p-8 lg:p-10">

        <span
          class="inline-flex items-center px-4 py-2 rounded-full bg-white/10 border border-white/20 text-sm font-medium">
          {{ popupData.modal.brand.badge }}
        </span>

        <h2 class="text-4xl font-bold mt-6 leading-tight">
          {{ popupData.modal.brand.title }}
          <span class="text-yellow-300">
            {{ popupData.modal.brand.highlight }}
          </span>
        </h2>

        <p class="mt-5 text-blue-100 leading-relaxed">
          {{ popupData.modal.brand.description }}
        </p>
      </div>

      <div class="relative p-8 lg:p-10">

        <button type="button" (click)="close()"
          class="absolute top-5 right-5 w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-xl">
          ×
        </button>

        <div class="mb-8">

          <h3 class="text-3xl font-bold text-gray-900">
            {{ popupData.form.title }}
          </h3>

          <p class="text-gray-500 mt-2">
            {{ popupData.form.description }}
          </p>

        </div>

        <form #contactForm="ngForm" (ngSubmit)="submitForm(contactForm)" class="space-y-5">

          <div class="grid md:grid-cols-2 gap-4">

            <input type="text" name="name" [(ngModel)]="leadPayload.name" placeholder="Full Name" required
              class="w-full px-5 py-4 rounded-xl border border-gray-200 focus:border-blue-600 focus:ring-4 focus:ring-blue-100 outline-none">

            <input type="tel" name="phone" [(ngModel)]="leadPayload.phone" placeholder="Phone Number" required
              class="w-full px-5 py-4 rounded-xl border border-gray-200 focus:border-blue-600 focus:ring-4 focus:ring-blue-100 outline-none">

          </div>

          <input type="email" name="email" [(ngModel)]="leadPayload.email" placeholder="Email Address" required
            class="w-full px-5 py-4 rounded-xl border border-gray-200 focus:border-blue-600 focus:ring-4 focus:ring-blue-100 outline-none">

          <select  name="location" [(ngModel)]="selectedLocation" required
            class="w-full px-5 py-4 rounded-xl border border-gray-200 focus:border-blue-600 focus:ring-4 focus:ring-blue-100 outline-none">

            <option *ngFor="let city of cities" [value]="city.name">
              {{ city.name }}
            </option>

          </select>

          <select name="serviceType" [(ngModel)]="leadPayload.serviceType" required
            class="w-full px-5 py-4 rounded-xl border border-gray-200 focus:border-blue-600 focus:ring-4 focus:ring-blue-100 outline-none">

            <option value="">
              Select Service
            </option>

            <option value="Solar Installation">
              Solar Installation
            </option>

            <option value="Electrical Contracting">
              Electrical Contracting
            </option>

            <option value="Energy Audit">
              Energy Audit
            </option>

            <option value="Infrastructure Solutions">
              Infrastructure Solutions
            </option>

          </select>

          <textarea rows="5" name="message" [(ngModel)]="leadPayload.message"
            placeholder="Tell us about your project..."
            class="w-full px-5 py-4 rounded-xl border border-gray-200 focus:border-blue-600 focus:ring-4 focus:ring-blue-100 outline-none">
          </textarea>

          <button type="submit" [disabled]="contactForm.invalid || isSubmitting"
            class="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-semibold text-lg shadow-lg hover:scale-[1.02] transition-all duration-300 disabled:opacity-50">

            {{ isSubmitting ? 'Submitting...' : 'Get Free Consultation' }}

          </button>

        </form>

      </div>

    </div>

  </div>

</div>
}
