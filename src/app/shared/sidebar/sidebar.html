<div class="w-64 h-screen bg-gray-900 text-white p-5">

  <h1 class="text-2xl font-bold mb-10">
    Edison Admin
  </h1>

  <ul>

    @for (
      item of menuItems;
      track item.route
    ) {

      <li class="mb-4">

        <button
          (click)="navigate(item.route)"
          routerLinkActive="bg-gray-700"
          class="w-full text-left block hover:bg-gray-700 p-3 rounded-lg">

          {{ item.label }}

        </button>

      </li>
    }

  </ul>

</div>
