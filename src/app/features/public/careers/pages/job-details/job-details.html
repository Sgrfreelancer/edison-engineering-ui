<section class="py-24 bg-gray-50">

  <div class="max-w-7xl mx-auto px-6 lg:px-10">


    <div class="text-center mb-16">

      <h1 class="text-5xl font-bold text-gray-900">
        {{ jobData.title }}
      </h1>

      <p class="mt-4 text-gray-600 max-w-2xl mx-auto">
        {{ jobData.description }}
      </p>

    </div>


    <div class="space-y-6">

      @for (job of jobData.jobs; track job.title) {

        <div
          class="bg-white rounded-3xl shadow-lg p-8 hover:shadow-2xl transition-all duration-300">

          <div
            class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">

            <div class="flex-1">

              <h3 class="text-2xl font-bold text-gray-900">
                {{ job.title }}
              </h3>

              <div class="flex flex-wrap gap-4 mt-3">

                <span
                  class="px-4 py-2 bg-blue-50 text-blue-700 rounded-full text-sm font-medium">
                  📍 {{ job.location }}
                </span>

                <span
                  class="px-4 py-2 bg-green-50 text-green-700 rounded-full text-sm font-medium">
                  💼 {{ job.type }}
                </span>

                <span
                  class="px-4 py-2 bg-orange-50 text-orange-700 rounded-full text-sm font-medium">
                  ⭐ {{ job.experience }}
                </span>

              </div>

              <p class="mt-5 text-gray-600 leading-relaxed">
                {{ job.description }}
              </p>

            </div>

            <div>

              <a
                [routerLink]="job.route"
                class="inline-flex items-center px-6 py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700 transition">

                Apply Now

              </a>

            </div>

          </div>

        </div>

      }

    </div>

  </div>

</section>
