@if (blog) {

<section class="max-w-5xl mx-auto py-20">

  <img
    [src]="blog.imageUrl"
    [alt]="blog.title"
    class="w-full h-[450px] object-cover rounded-xl">

  <p class="mt-5 text-sm text-blue-600">
    {{ blog.createdAt | date:'dd MMM yyyy' }}
  </p>

  <h1 class="text-4xl font-bold mt-3">
    {{ blog.title }}
  </h1>

  <div class="mt-6 text-gray-700 leading-8">
    {{ blog.content }}
  </div>

</section>

} @else {

<div class="text-center py-20">
  Loading...
</div>

}
