<section
  class="py-24 bg-gray-100">

  <div
    class="max-w-7xl mx-auto px-6">

    <div class="text-center mb-16">

      <h2
        class="text-4xl font-bold mb-5">

        Solar Energy Solutions
      </h2>

      <p
        class="text-gray-600 text-lg">

        Smart solar systems designed for homes and businesses.

      </p>

    </div>

    <div
      class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">

      @for (
        item of solutions;
        track item.title
      ) {

        <div
          class="bg-white rounded-3xl overflow-hidden shadow-lg hover:shadow-2xl transition">

          <img
            [src]="item.image"
            [alt]="item.title"
            class="h-64 w-full object-cover">

          <div class="p-8">

            <h3
              class="text-2xl font-semibold mb-4">

              {{ item.title }}
            </h3>

            <p
              class="text-gray-600 leading-8">

              {{ item.description }}
            </p>

          </div>

        </div>
      }

    </div>

  </div>

</section>
