<section
  class="py-24 bg-white">

  <div
    class="max-w-7xl mx-auto px-6">

    <div class="text-center mb-16">

      <h2
        class="text-4xl font-bold mb-5">

        Our Core Services
      </h2>

      <p
        class="text-gray-600 text-lg">

        Delivering reliable electrical and energy solutions.

      </p>

    </div>

    <div
      class="grid md:grid-cols-2 lg:grid-cols-5 gap-8">

     @for (service of services; track service.slug) {

        <a
      [routerLink]="['/services', service.slug]"
      class="block bg-gray-50 p-8 rounded-2xl hover:shadow-xl hover:-translate-y-1 transition">
          <h3
            class="text-xl font-semibold mb-4">

            {{ service.title }}
          </h3>

          <p
            class="text-gray-600 leading-8">

            {{ service.description }}
          </p>

        </a>
      }

    </div>

  </div>

</section>
