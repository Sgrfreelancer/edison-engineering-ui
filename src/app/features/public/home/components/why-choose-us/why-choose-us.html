
<section class="py-24 bg-gray-50 overflow-hidden">

  <div class="max-w-7xl mx-auto px-6 lg:px-10">


    <div class="max-w-3xl mx-auto text-center">

      <h2
        class="text-4xl lg:text-5xl font-bold text-gray-900 leading-tight">

        {{ sectionTitle }}

        <span class="text-blue-600">
          {{ highlightedTitle }}
        </span>

      </h2>

      <p
        class="mt-6 text-lg text-gray-600 leading-relaxed">

        {{ sectionDescription }}

      </p>

    </div>


    <div
      class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mt-14">

      @for (feature of features; track feature.title) {

        <div
          class="bg-white rounded-3xl p-8 shadow-md hover:shadow-2xl transition-all duration-300">

          <div
            class="w-16 h-16 rounded-2xl bg-blue-100 flex items-center justify-center text-3xl text-blue-600">

            {{ feature.icon }}

          </div>

          <h3
            class="mt-6 text-xl font-bold text-gray-900">

            {{ feature.title }}

          </h3>

          <p
            class="mt-4 text-gray-600 leading-relaxed">

            {{ feature.description }}

          </p>

        </div>

      }

    </div>

  </div>

</section>
