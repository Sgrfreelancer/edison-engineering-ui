<section
  class="py-24 bg-gray-100">

  <div
    class="max-w-7xl mx-auto px-6">

    <div class="text-center mb-16">

      <h2
        class="text-4xl font-bold mb-5">

        Cities We Serve
      </h2>

      <p
        class="text-gray-600 text-lg">

        Delivering solar and electrical solutions across Maharashtra.

      </p>

    </div>

    <div
      class="flex flex-wrap justify-center gap-5">

      @for (
        city of cities;
        track city
      ) {

        <div
          class="bg-white px-8 py-4 rounded-full shadow-md hover:shadow-xl transition">

          {{ city }}

        </div>
      }

    </div>

  </div>

</section>
