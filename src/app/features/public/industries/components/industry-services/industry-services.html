<section class="bg-gray-100 py-20">

  <div class="max-w-7xl mx-auto px-6">

    <h2
      class="text-4xl font-bold mb-10">

      Our Services

    </h2>

    <div
      class="grid md:grid-cols-3 gap-6">

      @for (
        service of services;
        track service
      ) {

        <div
          class="bg-white p-6 rounded-2xl shadow">

          {{ service }}

        </div>
      }

    </div>

  </div>

</section>
