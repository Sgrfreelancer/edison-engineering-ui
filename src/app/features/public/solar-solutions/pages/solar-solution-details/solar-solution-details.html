@if (solution) {

<app-solar-hero
  [title]="solution.title"
  [subtitle]="solution.subtitle"
  [image]="solution.heroImage">
</app-solar-hero>

<section
  class="max-w-7xl mx-auto px-6 py-20">

  <h2
    class="text-4xl font-bold mb-6">

    About Solution

  </h2>

  <p
    class="text-gray-700 text-lg leading-8">

    {{ solution.description }}

  </p>

</section>

<app-solar-benefits
  [benefits]="solution.benefits">
</app-solar-benefits>

<app-solar-process
  [process]="solution.process">
</app-solar-process>

<app-solar-faq
  [faqs]="solution.faqs">
</app-solar-faq>

<app-solar-cta>
</app-solar-cta>

}
