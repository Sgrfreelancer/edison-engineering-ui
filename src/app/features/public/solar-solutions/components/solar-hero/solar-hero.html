<section
  class="relative h-[500px]">

  <img
    [src]="image"
    class="w-full h-full object-cover" />

  <div
    class="absolute inset-0 bg-black/60 flex items-center">

    <div
      class="max-w-7xl mx-auto px-6 text-white">

      <h1
        class="text-5xl font-bold mb-5">

        {{ title }}

      </h1>

      <p class="text-xl">

        {{ subtitle }}

      </p>

    </div>

  </div>

</section>
