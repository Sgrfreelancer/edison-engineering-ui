<div class="p-6">

  <div
    class="flex justify-between items-center mb-6">

    <h1 class="text-3xl font-bold">
      Blogs
    </h1>

    <a
      routerLink="/admin/blogs/create"
      class="bg-black text-white px-5 py-2 rounded-lg">

      Create Blog
    </a>

  </div>

  @if (loading) {

    <div>
      Loading blogs...
    </div>

  } @else {

    <div class="space-y-4">

      @for (
        blog of blogs;
        track blog.id
      ) {

        <div
          class="border rounded-xl p-5">

          <h2
            class="text-2xl font-semibold mb-3">

            {{ blog.title }}
          </h2>

          <div
            class="prose max-w-none"
            [innerHTML]="blog.content">
          </div>

          <div
            class="mt-5 flex gap-3">

            <a
              [routerLink]="'/admin/blogs/edit/' + blog.slug"
              class="bg-blue-600 text-white px-4 py-2 rounded-lg">

              Edit
            </a>
          </div>

        </div>
      }

    </div>

  }

</div>
